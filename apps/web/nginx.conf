server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA: cualquier ruta que no sea un archivo real cae en index.html
        # para que react-router-dom maneje el ruteo del lado del cliente.
        try_files $uri /index.html;
    }
}

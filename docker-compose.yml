# Despliegue unificado (API + frontend web en un solo contenedor).
# Uso local para probar la imagen antes de Easypanel:
#   docker compose up --build
# Todo queda en http://localhost:4000 (API en /api/*, web en /).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "file:/data/app.db"
      PORT: "4000"
      JWT_SECRET: "change-me-access-secret"
      JWT_REFRESH_SECRET: "change-me-refresh-secret"
      HIGH_EXPENSE_THRESHOLD: "500"
      N8N_WEBHOOK_URL: "https://n8n-n8n.d3xtpr.easypanel.host/webhook/1e8263b0-7898-46f6-a2ea-8963d45e0e5b"
      OWNER_EMAIL: "israelmayalara@gmail.com"
      OWNER_NAME: "Israel"
      OWNER_PASSWORD: "change-me-strong-password"
    volumes:
      - app_data:/data

volumes:
  app_data:
